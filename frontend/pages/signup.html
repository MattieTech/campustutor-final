<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create Account — CampusTutor AI</title>
<link rel="stylesheet" href="/css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">
<div class="auth-orb1"></div>
<div class="auth-orb2"></div>
<div class="auth-card">
  <div style="position:absolute;top:16px;right:16px;">
    <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">🌙</button>
  </div>
  <div class="auth-brand">
    <div class="auth-brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
    <h1><span class="brand-campus">Campus</span><span class="brand-tutor">Tutor</span><span class="brand-ai">AI</span></h1>
    <p>Create your free account and start studying smarter.</p>
  </div>
  <div class="alert alert-error" id="errMsg"></div>
  <div class="alert alert-success" id="okMsg"></div>
  
  <form id="signupForm">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-input" type="text" id="fullName" placeholder="e.g. Matthew Adeyemi" required autocomplete="name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="you@school.edu.ng" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-input-wrapper">
        <input class="form-input" type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password"/>
        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="password-input-wrapper">
        <input class="form-input" type="password" id="confirmPwd" placeholder="Repeat your password" required autocomplete="new-password"/>
        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('confirmPwd', this)" aria-label="Toggle password visibility">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Referral Code (Optional)</label>
      <input class="form-input" type="text" id="referredByInput" placeholder="e.g. CT_REF_XXXXXX"/>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">Create Free Account →</button>
  </form>



  <div class="auth-divider">or</div>
  
  <!-- Continue with Google Button -->
  <div id="google-signin-btn" style="width:100%;display:flex;justify-content:center;margin-bottom:16px;min-height:44px;"></div>

  <div class="auth-footer">Already have an account? <a href="/pages/login.html">Log in</a></div>
  <div style="text-align:center;margin-top:12px;"><a href="/" style="font-size:0.8rem;color:var(--label3);">← Back to Home</a></div>
  <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--sep);font-size:0.73rem;color:var(--label4);"><i class="fa-solid fa-bolt"></i> Developed & Maintained by MattieTech</div>
</div>
<script src="/js/api.js"></script>
<script>
const t=localStorage.getItem('ct_theme')||'light';
document.documentElement.setAttribute('data-theme',t);
document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
document.getElementById('themeBtn').addEventListener('click',()=>{
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('ct_theme',n);
  document.getElementById('themeBtn').textContent=n==='dark'?'☀️':'🌙';
  renderGoogleButton();
});
redirectIfLoggedIn();

// Capture referral parameter
const urlParams = new URLSearchParams(window.location.search);
const referredBy = urlParams.get('ref');
if (referredBy) {
  document.getElementById('referredByInput').value = referredBy.trim().toUpperCase();
}

let registeredEmail = '';

document.getElementById('signupForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const err=document.getElementById('errMsg'),ok=document.getElementById('okMsg');
  err.style.display='none'; ok.style.display='none';
  const pwd=document.getElementById('password').value;
  if(pwd!==document.getElementById('confirmPwd').value){err.textContent='Passwords do not match.';err.style.display='block';return;}
  const btn=document.getElementById('signupBtn');
  btn.disabled=true; btn.textContent='Creating account...';
  
  registeredEmail = document.getElementById('email').value.trim();
  const refCodeVal = document.getElementById('referredByInput').value.trim();

  const {data,error}=await apiSignup(
    document.getElementById('fullName').value.trim(),
    registeredEmail,
    pwd,
    refCodeVal || null
  );
  if (error) {
    err.textContent = error; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create Free Account →';
    return;
  }
  
  const loginRes = await apiLogin(registeredEmail, pwd);
  if (loginRes.error) {
    ok.innerHTML = '<i class="fa-solid fa-circle-check"></i> Account created successfully! Redirecting to login...'; ok.style.display = 'block';
    setTimeout(() => { window.location.href = '/pages/login.html'; }, 1500);
    return;
  }
  
  ok.innerHTML = '<i class="fa-solid fa-circle-check"></i> Account created successfully! Redirecting to dashboard...'; ok.style.display = 'block';
  setTimeout(() => { window.location.href = '/pages/dashboard.html'; }, 1000);
});

let googleClientId = "";

async function initGoogleSignIn() {
  try {
    const { data } = await apiRequest('/api/auth/config');
    googleClientId = (data && data.googleClientId) || "1028751505342-placeholder.apps.googleusercontent.com";
    
    google.accounts.id.initialize({
      client_id: googleClientId,
      callback: handleCredentialResponse,
      auto_select: false,
      itp_support: true
    });
    
    renderGoogleButton();
  } catch (err) {
    console.error("Error initializing Google Sign-In:", err);
  }
}

function renderGoogleButton() {
  const btnContainer = document.getElementById("google-signin-btn");
  if (btnContainer && window.google) {
    google.accounts.id.renderButton(
      btnContainer,
      { 
        theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'filled_black' : 'outline', 
        size: 'large',
        width: btnContainer.offsetWidth || 340,
        text: 'continue_with',
        shape: 'pill'
      }
    );
  }
}

async function handleCredentialResponse(response) {
  if (!response || !response.credential) {
    showToast('Google authentication failed.', 'error');
    return;
  }
  
  showToast('Connecting with Google...', 'info');
  const { data, error } = await apiRequest('/api/auth/google-login', 'POST', { credential: response.credential });
  if (error) {
    showToast(error, 'error');
    return;
  }
  
  // Save credentials and redirect
  localStorage.setItem("ct_token", data.token);
  localStorage.setItem("ct_user", JSON.stringify(data.user));
  showToast(`Welcome to CampusTutor, ${data.user.fullName}! <i class="fa-solid fa-circle-check"></i>`, 'success');
  setTimeout(() => { window.location.href = '/pages/dashboard.html'; }, 1000);
}

window.addEventListener('load', () => {
  initGoogleSignIn();
});
</script>
</body>
</html>
