<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Log In — CampusTutor AI</title>
<link rel="stylesheet" href="/css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">
<div class="auth-orb1"></div>
<div class="auth-orb2"></div>
<div class="auth-card">
  <div style="position:absolute;top:16px;right:16px;">
    <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">🌙</button>
  </div>
  <div class="auth-brand">
    <div class="auth-brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
    <h1><span class="brand-campus">Campus</span><span class="brand-tutor">Tutor</span><span class="brand-ai">AI</span></h1>
    <p>Welcome back! Log in to continue.</p>
  </div>
  <div id="statusAlert" style="display:none;padding:12px;border-radius:var(--r,12px);background:rgba(175,82,222,.1);border:1px solid rgba(175,82,222,.3);color:#af52de;margin-bottom:16px;text-align:center;font-size:0.9rem;font-weight:500;"><i class="fa-solid fa-hand-point-right"></i> Your session has expired. Please log in again! <i class="fa-solid fa-lock"></i></div>
  <div class="alert alert-error" id="errMsg"></div>
  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="you@school.edu.ng" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <label class="form-label" style="margin:0;">Password</label>
        <a href="/pages/reset.html" style="font-size:0.8rem;color:var(--blue);text-decoration:none;font-weight:600;">Forgot Password?</a>
      </div>
      <div class="password-input-wrapper">
        <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password"/>
        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">Log In →</button>
  </form>
  <div class="auth-divider">or</div>
  
  <!-- Continue with Google Button -->
  <div id="google-signin-btn" style="width:100%;display:flex;justify-content:center;margin-bottom:16px;min-height:44px;"></div>

  <div class="auth-footer">Don't have an account? <a href="/pages/signup.html">Sign up free</a></div>
  <div style="text-align:center;margin-top:12px;"><a href="/" style="font-size:0.8rem;color:var(--label3);">← Back to Home</a></div>
  <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--sep);font-size:0.73rem;color:var(--label4);"><i class="fa-solid fa-bolt"></i> Developed & Maintained by MattieTech</div>
</div>
<script src="/js/api.js"></script>
<script>
const t = localStorage.getItem('ct_theme')||'light';
document.documentElement.setAttribute('data-theme',t);
document.getElementById('themeBtn').textContent = t==='dark'?'☀️':'🌙';
document.getElementById('themeBtn').addEventListener('click',()=>{
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('ct_theme',n);
  document.getElementById('themeBtn').textContent=n==='dark'?'☀️':'🌙';
  renderGoogleButton();
});
redirectIfLoggedIn();
const params=new URLSearchParams(window.location.search);
if(params.get('status')==='expired'){document.getElementById('statusAlert').style.display='block';}
document.getElementById('loginForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const err=document.getElementById('errMsg');
  err.style.display='none';
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='Logging in...';
  const {data,error}=await apiLogin(document.getElementById('email').value.trim(),document.getElementById('password').value);
  if(error){err.textContent=error;err.style.display='block';btn.disabled=false;btn.textContent='Log In →';return;}
  showToast(`Welcome back, ${data.user.fullName}! <i class="fa-solid fa-hand"></i>`,'success');
  setTimeout(()=>{window.location.href='/pages/dashboard.html';},800);
});

let googleClientId = "";

async function initGoogleSignIn() {
  try {
    const { data } = await apiRequest('/api/auth/config');
    googleClientId = (data && data.googleClientId) || "1028751505342-placeholder.apps.googleusercontent.com";
    
    google.accounts.id.initialize({
      client_id: googleClientId,
      callback: handleCredentialResponse,
      auto_select: false,
      itp_support: true
    });
    
    renderGoogleButton();
  } catch (err) {
    console.error("Error initializing Google Sign-In:", err);
  }
}

function renderGoogleButton() {
  const btnContainer = document.getElementById("google-signin-btn");
  if (btnContainer && window.google) {
    google.accounts.id.renderButton(
      btnContainer,
      { 
        theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'filled_black' : 'outline', 
        size: 'large',
        width: btnContainer.offsetWidth || 340,
        text: 'continue_with',
        shape: 'pill'
      }
    );
  }
}

async function handleCredentialResponse(response) {
  if (!response || !response.credential) {
    showToast('Google authentication failed.', 'error');
    return;
  }
  
  showToast('Connecting with Google...', 'info');
  const { data, error } = await apiRequest('/api/auth/google-login', 'POST', { credential: response.credential });
  if (error) {
    showToast(error, 'error');
    return;
  }
  
  // Save credentials and redirect
  localStorage.setItem("ct_token", data.token);
  localStorage.setItem("ct_user", JSON.stringify(data.user));
  showToast(`Welcome back, ${data.user.fullName}! <i class="fa-solid fa-circle-check"></i>`, 'success');
  setTimeout(() => { window.location.href = '/pages/dashboard.html'; }, 1000);
}

window.addEventListener('load', () => {
  initGoogleSignIn();
});
</script>
</body>
</html>
